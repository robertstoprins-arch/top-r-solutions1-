[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"
  included_files = ["api/**", "knowledge_base/**"]

# Proxy chat API to the Node.js serverless function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

# React Router — serve index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
